<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EGGS-Studio</title>
  <link rel="icon" href="/assets/img/EGGSLOGOindex1.png" type="image/png" sizes="32x32">
  <meta name="description" content="EGGS-Studio: arte visual, murales, proyectos comunitarios y restauracion por Esteban Garnica, Santiago de Chile.">
  <meta name="keywords" content="EGGS Studio, Esteban Garnica, arte visual, murales, comunidad, restauracion, Santiago de Chile">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#16181b">
  <meta property="og:title" content="EGGS-Studio">
  <meta property="og:description" content="Arte visual, murales, comunidad y archivo de obra de Esteban Garnica.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://eggs-studio.cl/assets/img/EGGSLOGOindex1.png">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      color: #f4f5f6;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 16% 10%, rgba(205, 213, 224, 0.2), transparent 28rem),
        radial-gradient(circle at 88% 16%, rgba(115, 124, 136, 0.18), transparent 24rem),
        linear-gradient(180deg, #24272d 0%, #181b20 46%, #101215 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.032) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.52), transparent 78%);
    }

    .landing {
      min-height: 100vh;
      display: grid;
      grid-template-rows: minmax(52vh, 1fr) auto;
    }

    .hero {
      position: relative;
      min-height: 52vh;
      overflow: hidden;
      background: #000;
      border-bottom: 1px solid rgba(230, 234, 240, 0.16);
    }

    .hero-bg {
      width: 100%;
      height: 100%;
      min-height: 52vh;
      display: block;
      object-fit: cover;
      opacity: 0.78;
      filter: saturate(0.92) contrast(1.05);
      transform: scale(1.02);
      animation: slowDrift 18s cubic-bezier(.2,.8,.2,1) infinite alternate;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(0,0,0,0.76), rgba(0,0,0,0.18) 55%, rgba(0,0,0,0.52)),
        linear-gradient(0deg, rgba(16,18,21,0.95), transparent 42%);
      pointer-events: none;
    }

    @keyframes slowDrift {
      from { transform: scale(1.02) translateY(0); }
      to { transform: scale(1.075) translateY(-1.4%); }
    }

    .hero-brand {
      position: absolute;
      inset: clamp(1rem, 4vw, 3rem);
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
    }

    .brand-mark {
      width: clamp(4.5rem, 9vw, 8rem);
      height: clamp(4.5rem, 9vw, 8rem);
      min-height: 0;
      object-fit: contain;
      filter: drop-shadow(0 18px 38px rgba(0,0,0,0.52));
      animation: markPulse 4.5s ease-in-out infinite;
    }

    @keyframes markPulse {
      0%, 100% { transform: scale(1); opacity: 0.96; }
      50% { transform: scale(1.035); opacity: 1; }
    }

    .hero-copy {
      max-width: 58rem;
    }

    h1 {
      margin: 0;
      color: #fff;
      font-size: clamp(3rem, 11vw, 8.8rem);
      font-weight: 900;
      line-height: 0.82;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .tagline {
      max-width: 42rem;
      margin: 1.1rem 0 0;
      color: rgba(244,245,246,0.86);
      font-size: clamp(1.1rem, 2.4vw, 2rem);
      font-weight: 700;
      line-height: 1.12;
    }

    .entry {
      width: min(1200px, calc(100% - 2rem));
      margin: 0 auto;
      padding: clamp(1.5rem, 4vw, 3rem) 0 clamp(2.5rem, 5vw, 4rem);
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.9fr);
      gap: clamp(1rem, 4vw, 4rem);
      align-items: end;
    }

    .intro {
      margin: 0;
      color: rgba(244,245,246,0.76);
      font-size: clamp(1rem, 1.4vw, 1.25rem);
      line-height: 1.55;
    }

    .language-selection {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1px;
      margin: 0;
      background: rgba(230, 234, 240, 0.16);
      border: 1px solid rgba(230, 234, 240, 0.16);
    }

    .language-selection a {
      min-height: 6rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 1rem;
      color: #fff;
      background: rgba(32, 36, 43, 0.9);
      text-decoration: none;
      transition: background 180ms cubic-bezier(.2,.8,.2,1), transform 180ms cubic-bezier(.2,.8,.2,1);
    }

    .language-selection a:hover,
    .language-selection a:focus-visible {
      background: #2f343c;
      outline: 2px solid #aeb8c7;
      outline-offset: 3px;
      transform: translateY(-2px);
    }

    .language-selection strong {
      font-size: clamp(1.4rem, 2.5vw, 2.2rem);
      line-height: 1;
    }

    .language-selection span {
      color: rgba(244,245,246,0.68);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .language-selection a::after {
      content: ">";
      align-self: flex-end;
      width: 1.85rem;
      height: 1.85rem;
      display: grid;
      place-items: center;
      color: #fff;
      background: #fc3d21;
      border-radius: 50%;
      font-weight: 900;
    }

    .noscript {
      width: min(1200px, calc(100% - 2rem));
      margin: 0 auto 2rem;
      color: #fff;
    }

    .noscript a {
      color: #d7dde5;
    }

    @media (max-width: 760px) {
      .landing {
        grid-template-rows: minmax(58vh, 1fr) auto;
      }

      .hero,
      .hero-bg {
        min-height: 58vh;
      }

      .entry {
        grid-template-columns: 1fr;
        align-items: start;
      }

      .language-selection {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="landing">
    <section class="hero" aria-label="EGGS-Studio">
      <img src="/assets/img/intro-a-web-eggstudiob.webp" alt="Animacion introductoria de EGGS-Studio" class="hero-bg">
      <div class="hero-brand">
        <img src="/assets/img/EGGSLOGOindex1.png" alt="EGGS logo" class="brand-mark">
        <div class="hero-copy">
          <h1>EGGS-Studio</h1>
          <p class="tagline">Arte visual, murales, comunidad y archivo de obra.</p>
        </div>
      </div>
    </section>

    <section class="entry" aria-label="Seleccion de idioma">
      <p class="intro">
        Plataforma creativa de Esteban Garnica. Contemporary visual art, community murals,
        expanded painting and cultural projects from Santiago de Chile.
      </p>

      <nav class="language-selection" aria-label="Language selection">
        <a href="/ES/index.html" hreflang="es" lang="es" onclick="setLanguage('es')">
          <strong>Español</strong>
          <span>Entrar al sitio</span>
        </a>
        <a href="/EN/index.html" hreflang="en" lang="en" onclick="setLanguage('en')">
          <strong>English</strong>
          <span>Enter site</span>
        </a>
        <a href="/MPD/index.html" hreflang="arn" lang="arn" onclick="setLanguage('arn')">
          <strong>Mapudungun</strong>
          <span>Version en preparacion</span>
        </a>
      </nav>
    </section>
  </main>

  <script>
    function setLanguage(lang) {
      try {
        if (typeof Storage !== 'undefined') {
          localStorage.setItem('language', lang);
        }
      } catch (e) {}
    }
  </script>

  <noscript>
    <p class="noscript">
      JavaScript is disabled:
      <a href="/ES/index.html">Version en Espanol</a> /
      <a href="/EN/index.html">English version</a> /
      <a href="/MPD/index.html">Mapudungun version</a>
    </p>
  </noscript>
</body>
</html>
