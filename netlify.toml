[build]
  command = "node tools/generate_commerce_products.js && bundle install && bundle exec jekyll build && python3 tools/generate_redirects.py --site _site"
  publish = "_site"
  functions = "netlify/functions"
  environment = { RUBY_VERSION = "3.2.2", BUNDLE_FORCE_RUBY_PLATFORM = "1" }

[functions]
  directory = "netlify/functions"

[build.processing.html]
  pretty_urls = false

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://code.jquery.com https://*.mercadopago.com https://sdk.mercadopago.com https://www.mercadopago.cl https://sandbox.mercadopago.cl https://challenges.cloudflare.com; connect-src 'self' https://api.mercadopago.com https://www.mercadopago.cl https://sandbox.mercadopago.cl https://challenges.cloudflare.com; frame-src https://www.mercadopago.cl https://sandbox.mercadopago.cl https://challenges.cloudflare.com; form-action 'self' https://formsubmit.co; upgrade-insecure-requests"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(self \"https://www.mercadopago.cl\" \"https://sandbox.mercadopago.cl\")"
    X-Frame-Options = "DENY"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-store"
    X-Content-Type-Options = "nosniff"
