[build]
  command = "rm -rf _site .jekyll-cache .sass-cache && node tools/generate_commerce_products.js && bundle install && bundle exec jekyll build --trace && python3 tools/mirror_lowercase_languages.py --site _site && python3 tools/generate_redirects.py --site _site && python3 tools/validate_site.py --source . --site _site"
  publish = "_site"
  functions = "netlify/functions"
  environment = { RUBY_VERSION = "3.2.2", BUNDLE_FORCE_RUBY_PLATFORM = "1", JEKYLL_ENV = "production" }

[functions]
  directory = "netlify/functions"

[build.processing.html]
  pretty_urls = false

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://code.jquery.com https://*.mercadopago.com https://sdk.mercadopago.com https://www.mercadopago.cl https://sandbox.mercadopago.cl https://challenges.cloudflare.com; connect-src 'self' https://api.mercadopago.com https://www.mercadopago.cl https://sandbox.mercadopago.cl https://challenges.cloudflare.com; frame-src https://www.mercadopago.cl https://sandbox.mercadopago.cl https://challenges.cloudflare.com https://www.youtube-nocookie.com https://www.youtube.com; form-action 'self'; upgrade-insecure-requests"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(self \"https://www.mercadopago.cl\" \"https://sandbox.mercadopago.cl\")"
    X-Frame-Options = "DENY"

[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"

[[headers]]
  for = "/es/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"

[[headers]]
  for = "/en/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"

[[headers]]
  for = "/mpd/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"

[[headers]]
  for = "/chn/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-store"
    X-Content-Type-Options = "nosniff"
