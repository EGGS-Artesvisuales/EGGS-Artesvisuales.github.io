[build]
  command = "node tools/generate_commerce_products.js && bundle install && bundle exec jekyll build && python3 tools/generate_redirects.py --site _site"
  publish = "_site"
  functions = "netlify/functions"
  environment = { RUBY_VERSION = "3.2.2", BUNDLE_FORCE_RUBY_PLATFORM = "1" }

[functions]
  directory = "netlify/functions"

[build.processing.html]
  pretty_urls = false
