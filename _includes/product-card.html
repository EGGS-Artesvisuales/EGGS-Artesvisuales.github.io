<article class="shop-card" itemscope itemtype="https://schema.org/Product">
  <a class="shop-card__media" href="{{ include.product.url }}" aria-label="{{ include.t.card_open }} {{ include.product.title | escape }}">
    <img src="{{ include.product.image }}" alt="{{ include.product.title | escape }}" loading="lazy" itemprop="image">
  </a>
  <div class="shop-card__body">
    <p class="shop-card__meta">{{ include.product.product_type }} / {{ include.product.sku }}</p>
    <h3 itemprop="name"><a href="{{ include.product.url }}">{{ include.product.title }}</a></h3>
    <p class="shop-card__format">{{ include.product.format }}</p>
    <p class="shop-card__state"><span aria-hidden="true"></span>{{ include.product.state }}</p>
    <div class="shop-card__footer">
      <strong>{{ include.product.price_display }}</strong>
      <a href="{{ include.product.url }}" aria-label="{{ include.t.card_open }} {{ include.product.title | escape }}">{{ include.t.card_view }}</a>
    </div>
  </div>
</article>
