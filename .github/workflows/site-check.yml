name: Validate site

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.2'

      - name: Install Ruby dependencies
        run: |
          bundle config set path vendor/bundle
          bundle install --jobs=4 --retry=3

      - name: Generate commerce catalog
        run: node tools/generate_commerce_products.js

      - name: Build Jekyll site
        run: bundle exec jekyll build --trace

      - name: Mirror lowercase language routes
        run: python tools/mirror_lowercase_languages.py --site _site

      - name: Generate canonical redirects
        run: python tools/generate_redirects.py --site _site

      - name: Validate routes and internal links
        run: python tools/validate_site.py --source . --site _site
