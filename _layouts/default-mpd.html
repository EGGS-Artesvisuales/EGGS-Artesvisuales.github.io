<!DOCTYPE html>
<html lang="{{ page.lang | default: 'arn' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{{ page.title | default: 'EGGS-Studio | Mapuzungun' }}</title>
  <meta name="description" content="{{ page.description | default: 'Version Mapuzungun de EGGS-Studio.' }}">
  <meta name="keywords" content="{{ page.keywords | default: 'EGGS-Studio, Mapuzungun, arte visual, Esteban Garnica' }}">
  <meta name="author" content="EGGS-Studio">
  <meta name="robots" content="index, follow">
  <meta name="language" content="arn-CL">

  <link rel="icon" href="/assets/img/EGGSLOGOindex1.png" type="image/png" sizes="32x32">
  <meta name="theme-color" content="#000000">
  <link rel="canonical" href="{{ site.url | default: 'https://eggs-studio.cl' }}{{ page.url }}">

  <meta property="og:title" content="{{ page.title | default: 'EGGS-Studio | Mapuzungun' }}">
  <meta property="og:description" content="{{ page.description | default: 'Version Mapuzungun de EGGS-Studio.' }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site.url | default: 'https://eggs-studio.cl' }}{{ page.url }}">
  <meta property="og:image" content="{{ site.url | default: 'https://eggs-studio.cl' }}/assets/img/EGGSLOGOindex1.png">
  <meta property="og:locale" content="arn_CL">
  <meta property="og:site_name" content="EGGS-Studio">

  {% if page.carousel %}
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css">
  {% endif %}

  <link rel="stylesheet" href="/assets/css/style.css">
  {% if page.carousel %}
    <link rel="stylesheet" href="/assets/css/carousel.css">
  {% endif %}

  {% if page.mermaid %}
    <script defer src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script defer src="/assets/js/mermaid-init.js"></script>
  {% endif %}
</head>

<body>
  {% include header-mpd.html %}

  <main id="main-content" role="main">
    {{ content }}
  </main>

  {% include footer-mpd.html %}

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  {% if page.carousel %}
    <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>
    <script src="/assets/js/carousel-init.js"></script>
  {% endif %}
  {% if page.progreso %}
    <script src="/assets/js/progreso.js" defer></script>
  {% endif %}
  <script src="/assets/js/menu.js" defer></script>
</body>
</html>
