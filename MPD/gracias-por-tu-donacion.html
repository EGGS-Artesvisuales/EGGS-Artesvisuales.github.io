<!DOCTYPE html>
<html lang="arn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mañum tami kellun mew - EGGS Studio</title>
    <!-- Favicon -->
    <link rel="icon" href="/assets/img/EGGSLOGOindex1.png" type="image/png" sizes="32x32">

    <style>
        /* Nor reglas */
        * {
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #222; /* Kurü fondo */
            color: #777;           /* Pichi lig color */
        }

        /* Logo */
        .logo-container {
            margin-top: 13%; /* Logo ñi wente püle */
        }
        .logo-container img {
            width: 101px;
            height: 101px;
            animation: pulse 2s infinite; /* Animación */
            display: block;
            margin: 0 auto;
        }

        /* Logo pulse */
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.7;
                transform: scale(1.1);
            }
        }

        /* Üy ka pichi üy */
        .title {
            font-size: 2em;
            margin-top: 20px;
            color:  #58a6ff;
        }

        .subtitle {
            font-size: 1.2em;
            margin-top: 10px;
            margin-bottom: 40px;
            color: #ccc;
        }

        /* Wiñotun botón */
        .btn-volver {
            background-color: transparent;
            color: #fff;
            border: 2px solid #58a6ff;
            padding: 12px 25px;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition:
                background-color 0.3s ease,
                color 0.3s ease,
                transform 0.2s ease;
            margin-top: 77px;
        }
        .btn-volver:hover {
            background-color: #58a6ff;
            color: #f4f4f4;
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <!-- Logo -->
    <div class="logo-container">
        <img src="/assets/img/EGGSLOGOindex1.png" alt="EGGS-Studio logo">
    </div>

    <header>
        <h1 class="title">Mañum tami kellun mew</h1>
        <p class="subtitle">Tami kellun amulniey iñchiñ ñi az-küdaw ka dewman küdaw.</p>
    </header>
    <main>
        <!-- Wiñotun botón -->
        <a href="/MPD/index.html" class="btn-volver">Wünen mew wiñotun</a>
    </main>
</body>
</html>
